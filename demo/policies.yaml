version: "1"
agents:
  - name: "langchain-bot"
    key: "$2a$10$zmUdNg9T6RWlvx8e9CVpZeSNtYkUQUjRhSfXazCmATEMNyevxybbe" # Hash for "test-agent-key"
    allowed_statements:
      - SELECT
      - SHOW
      - SET
      - ROLLBACK
    allowed_tables:
      - users
      - products
      - order_items
      - reviews
      - orders
      - information_schema.tables
      - information_schema.columns
      - pg_catalog.pg_class
      - pg_catalog.pg_namespace
      - pg_catalog.pg_attribute
      - pg_catalog.pg_type
      - pg_catalog.pg_am
      - pg_catalog.pg_database
    blocked_functions:
      - pg_sleep
      - pg_read_file
      - pg_ls_dir
      - pg_execute_server_program
    select_limit: 100
