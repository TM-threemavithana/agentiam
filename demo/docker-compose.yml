version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - backend

  agentiam:
    build:
      context: .. # Build from root so we can access AgentIAM source
      dockerfile: Dockerfile
    environment:
      - AGENTIAM_INSECURE_CLEARTEXT_AUTH=true
      - AGENTIAM_LISTEN_PORT=5432
      - AGENTIAM_UPSTREAM_DSN=postgres://app_user:supersecretpassword@postgres:5432/postgres?sslmode=disable
      - AGENTIAM_POLICY_FILE=/etc/agentiam/policies.yaml
      - AGENTIAM_POLL_INTERVAL=5s
      - AGENTIAM_METRICS_PORT=9090
      - AGENTIAM_DEV_MODE=true
    ports:
      - "5433:5432"
    volumes:
      - ./policies.yaml:/etc/agentiam/policies.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/metrics || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - backend
      - frontend

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AGENTIAM_DEMO_MOCK=${AGENTIAM_DEMO_MOCK:-false}
      - PYTHONUNBUFFERED=1
    depends_on:
      agentiam:
        condition: service_healthy
    networks:
      - frontend
    restart: "no"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
