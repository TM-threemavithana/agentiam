<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .box-primary { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; ry: 8; }
      .box-danger { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 8; ry: 8; }
      .box-success { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 8; ry: 8; }
      .text-title { font-family: -apple-system, system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
      .text-danger { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #b91c1c; text-anchor: middle; }
      .text-danger-sub { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #dc2626; text-anchor: middle; }
      .text-success { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #047857; text-anchor: middle; }
      .text-success-sub { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #059669; text-anchor: middle; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .arrow-text { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #64748b; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- AI Agent -->
  <rect class="box" x="20" y="110" width="160" height="80" />
  <text class="text-title" x="100" y="145">AI Agent</text>
  <text class="text-sub" x="100" y="165">(LangChain / LlamaIndex)</text>

  <!-- Arrow to Proxy -->
  <path class="arrow" d="M 180 150 L 260 150" marker-end="url(#arrowhead)" />
  <text class="arrow-text" x="220" y="140" text-anchor="middle">SQL Query</text>

  <!-- AgentIAM Proxy -->
  <rect class="box-primary" x="270" y="90" width="200" height="120" />
  <text class="text-title" x="370" y="130">AgentIAM Proxy</text>
  <text class="text-sub" x="370" y="150">AST Semantic Firewall</text>
  <text class="text-sub" x="370" y="170">(Port 5432)</text>

  <!-- Arrow Blocked -->
  <path class="arrow" d="M 470 120 L 550 70" marker-end="url(#arrowhead)" />
  <text class="arrow-text" x="510" y="85" text-anchor="middle" transform="rotate(-30, 510, 85)">Malicious</text>

  <!-- Blocked Action -->
  <rect class="box-danger" x="560" y="40" width="160" height="60" />
  <text class="text-danger" x="640" y="65">Connection Dropped</text>
  <text class="text-danger-sub" x="640" y="85">Blocked by Policy</text>

  <!-- Arrow Allowed -->
  <path class="arrow" d="M 470 180 L 550 230" marker-end="url(#arrowhead)" />
  <text class="arrow-text" x="510" y="215" text-anchor="middle" transform="rotate(30, 510, 215)">Allowed</text>

  <!-- Database -->
  <rect class="box-success" x="560" y="200" width="160" height="60" />
  <text class="text-success" x="640" y="225">Upstream Database</text>
  <text class="text-success-sub" x="640" y="245">(PostgreSQL / MySQL)</text>

</svg>
