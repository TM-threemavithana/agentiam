apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentiam.fullname" . }}
  labels:
    app: {{ include "agentiam.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: {{ include "agentiam.name" . }}
