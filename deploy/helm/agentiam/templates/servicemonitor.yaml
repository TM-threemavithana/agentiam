{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "agentiam.fullname" . }}
  labels:
    app: {{ include "agentiam.name" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "agentiam.name" . }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
