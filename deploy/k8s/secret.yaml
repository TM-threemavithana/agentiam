# deploy/k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: agentiam-secrets
  namespace: agentiam
type: Opaque
stringData:
  policies.yaml: |
    version: "1"
    agents:
      - name: "langchain-bot"
        key_hash: "$2a$10$REPLACE_WITH_BCRYPT_HASH"
        allowed_statements:
          - SELECT
          - INSERT
        allowed_tables:
          - users
          - products
        select_limit: 100
        created_at: "2026-01-15T10:00:00Z"

  userlist.txt: |
    "app_user" "REPLACE_WITH_PGBOUNCER_PASSWORD"
