version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentiam
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - backend

  agentiam:
    build:
      context: ../../..
      dockerfile: Dockerfile
    environment:
      - AGENTIAM_LISTEN_PORT=5432
      - AGENTIAM_UPSTREAM_DSN=postgres://postgres:postgres@postgres:5432/agentiam?sslmode=disable
      - AGENTIAM_POLICY_FILE=/etc/agentiam/policies.yaml
      - AGENTIAM_POLL_INTERVAL=5s
    ports:
      - "15432:5432"
    volumes:
      - ./policies.yaml:/etc/agentiam/policies.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
